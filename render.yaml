services:
  - type: web
    name: registru-operativ-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/registru.db
    disk:
      name: db-storage
      mountPath: /data
      sizeGB: 1
